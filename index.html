<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>프로 탁구 챌린지</title>

<style>
:root {
  --table: #1e5d2f;
  --line: #fff;
}

body {
  margin: 0;
  background: black;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

/* 코트 */
#court {
  position: relative;
  width: 400px;
  height: 600px;
  background: var(--table);
  border: 6px solid var(--line);
}

/* 네트 */
#net {
  position: absolute;
  top: 50%;
  width: 100%;
  height: 4px;
  background: rgba(255,255,255,0.4);
}

/* 공 */
#ball {
  position: absolute;
  width: 14px;
  height: 14px;
  background: white;
  border-radius: 50%;
}

/* 라켓 */
.paddle {
  position: absolute;
  width: 70px;
  height: 70px;
}

#controls { margin-top: 20px; }
button.active { background: gold; }
</style>
</head>

<body>

<div id="court">
  <div id="net"></div>
  <div id="ball"></div>

  <svg id="user" class="paddle"></svg>
  <svg id="cpu" class="paddle"></svg>
</div>

<div id="controls">
  <button onclick="setSkill('cut')">커트</button>
  <button onclick="setSkill('drive')" class="active">드라이브</button>
  <button onclick="setSkill('smash')">스매시</button>
</div>

<script>
// =====================
// 상태
// =====================
const state = {
  skill: 'drive',
  level: 1,

  score: { user: 0, cpu: 0 },

  ball: { x: 200, y: 300, dx: 2, dy: 4 },

  user: { x: 165, y: 520 },
  cpu: { x: 165, y: 10 },

  running: true
};

const LEVEL = [
  { speed: 3, ball: 4 },
  { speed: 5, ball: 6 },
  { speed: 8, ball: 9 }
];

// =====================
// DOM
// =====================
const ballEl = document.getElementById('ball');
const userEl = document.getElementById('user');
const cpuEl = document.getElementById('cpu');

// =====================
// 입력
// =====================
window.addEventListener('mousemove', e => {
  const rect = court.getBoundingClientRect();
  state.user.x = e.clientX - rect.left - 35;
});

// =====================
// 로직
// =====================
function moveBall() {
  state.ball.x += state.ball.dx;
  state.ball.y += state.ball.dy;
}

function wallOutCheck() {
  if (state.ball.x < -50 || state.ball.x > 450)
    score(state.ball.dy < 0);

  if (state.ball.y < -20)
    score(true);

  if (state.ball.y > 620)
    score(false);
}

function collisionUser() {
  if (state.ball.y > 510 && state.ball.dy > 0) {
    if (isHit(state.user.x)) {
      applySkill();
    }
  }
}

function collisionCPU() {
  if (state.ball.y < 40 && state.ball.dy < 0) {
    if (isHit(state.cpu.x)) {
      state.ball.dy = Math.abs(state.ball.dy);
    }
  }
}

function isHit(px) {
  return state.ball.x > px - 15 && state.ball.x < px + 75;
}

function applySkill() {
  const map = { cut: 1.1, drive: 1.6, smash: 2.2 };

  state.ball.dy = -Math.abs(state.ball.dy) * map[state.skill];
}

function cpuAI() {
  const target = state.ball.x;
  const center = state.cpu.x + 35;
  const speed = LEVEL[state.level - 1].speed;

  if (center < target) state.cpu.x += speed;
  else state.cpu.x -= speed;
}

function score(userWin) {
  state.running = false;

  if (userWin) state.score.user++;
  else state.score.cpu++;

  setTimeout(resetBall, 500);
}

// =====================
// 렌더
// =====================
function draw() {
  ballEl.style.left = state.ball.x + 'px';
  ballEl.style.top = state.ball.y + 'px';

  userEl.style.left = state.user.x + 'px';
  userEl.style.top = state.user.y + 'px';

  cpuEl.style.left = state.cpu.x + 'px';
  cpuEl.style.top = state.cpu.y + 'px';
}

// =====================
// 루프
// =====================
function loop() {
  if (!state.running) return;

  moveBall();
  wallOutCheck();
  collisionUser();
  collisionCPU();
  cpuAI();
  draw();

  requestAnimationFrame(loop);
}

// =====================
// 초기화
// =====================
function resetBall() {
  const speed = LEVEL[state.level - 1].ball;

  state.ball = {
    x: 200,
    y: 300,
    dx: (Math.random() - 0.5) * 4,
    dy: speed
  };

  state.running = true;
  loop();
}

function setSkill(s) {
  state.skill = s;
}

// 시작
resetBall();
</script>

</body>
</html>
