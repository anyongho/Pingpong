<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Real Table Tennis</title>
<style>
body { margin:0; background:#111; overflow:hidden; }
#court {
    width:100vw; height:100vh;
    background:#1e5d2f;
    position:relative;
}
#net {
    position:absolute;
    top:50%; width:100%; height:4px;
    background:white;
}
#ball {
    position:absolute;
    width:14px; height:14px;
    background:white; border-radius:50%;
}
.paddle {
    position:absolute;
    width:100px; height:20px;
    background:red;
}
#cpu { background:blue; top:20px; }
#user { bottom:20px; }
#score {
    position:absolute; top:10px; left:50%;
    transform:translateX(-50%);
    color:white; font-size:24px;
}
</style>
</head>
<body>

<div id="court">
<div id="net"></div>
<div id="ball"></div>
<div id="cpu" class="paddle"></div>
<div id="user" class="paddle"></div>
<div id="score">0 : 0</div>
</div>

<script>
const ball = document.getElementById("ball");
const user = document.getElementById("user");
const cpu = document.getElementById("cpu");
const scoreEl = document.getElementById("score");

let state = {
    ball:{x:0,y:0,dx:4,dy:4},
    score:{u:0,c:0},
    lastBounce:null,
    bounceCount:0,
    server:"user",
    running:true
};

function resetBall() {
    state.ball.x = innerWidth/2;
    state.ball.y = innerHeight/2;
    state.ball.dx = (Math.random() > 0.5 ? 4 : -4);
    state.ball.dy = state.server === "user" ? -4 : 4;
    state.bounceCount = 0;
}

resetBall();

document.addEventListener("mousemove", e=>{
    user.style.left = e.clientX - 50 + "px";
});

function cpuMove() {
    let target = state.ball.x;
    let current = cpu.offsetLeft + 50;
    
    // 반응 지연 + 오차
    let diff = target - current;
    cpu.style.left = current + diff*0.1 + (Math.random()-0.5)*10 - 50 + "px";
}

function update() {
    if(!state.running) return;

    state.ball.x += state.ball.dx;
    state.ball.y += state.ball.dy;

    // 벽 반사
    if(state.ball.x < 0 || state.ball.x > innerWidth) {
        state.ball.dx *= -1;
    }

    // 네트 충돌
    if(Math.abs(state.ball.y - innerHeight/2) < 5) {
        if(Math.random() < 0.7) {
            state.ball.dy *= -0.2; // 대부분 죽음
        }
    }

    // 패들 충돌
    let userY = innerHeight - 40;
    let cpuY = 40;

    // 유저
    if(state.ball.y > userY - 10 &&
       state.ball.x > user.offsetLeft &&
       state.ball.x < user.offsetLeft + 100) {
        state.ball.dy = -Math.abs(state.ball.dy) * 1.1;
        state.ball.dx += (Math.random()-0.5)*2;
        state.lastBounce = "cpu";
        state.bounceCount = 0;
    }

    // CPU
    if(state.ball.y < cpuY + 10 &&
       state.ball.x > cpu.offsetLeft &&
       state.ball.x < cpu.offsetLeft + 100) {
        state.ball.dy = Math.abs(state.ball.dy) * 1.1;
        state.ball.dx += (Math.random()-0.5)*2;
        state.lastBounce = "user";
        state.bounceCount = 0;
    }

    // 바운드 체크 (2바운드 룰)
    if(state.ball.y > innerHeight || state.ball.y < 0) {
        state.bounceCount++;

        if(state.bounceCount >= 1) {
            // 점수 판정
            if(state.ball.y < 0) {
                state.score.u++;
                state.server = "user";
            } else {
                state.score.c++;
                state.server = "cpu";
            }

            scoreEl.innerText = `${state.score.u} : ${state.score.c}`;
            resetBall();
            return;
        }
    }

    cpuMove();

    ball.style.left = state.ball.x + "px";
    ball.style.top = state.ball.y + "px";

    requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
