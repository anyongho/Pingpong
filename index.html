<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ITTF Pro Masters v11.1</title>
    <style>
        :root { --table: #1e5d2f; --line: #ffffff; --accent: #f1c40f; }
        body { margin: 0; background: #111; overflow: hidden; display: flex; flex-direction: column; height: 100vh; font-family: 'Pretendard', sans-serif; touch-action: none; color: white; }
        #menu { position: absolute; inset: 0; background: rgba(0,0,0,0.98); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        #menu h1 { color: var(--accent); font-size: 42px; margin-bottom: 5px; text-shadow: 0 0 20px rgba(241,196,15,0.5); }
        .rule-box { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; max-width: 600px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); line-height: 1.6; font-size: 13px; color: #ccc; text-align: left; }
        .rule-box h3 { margin: 8px 0 4px; color: #fff; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 3px; font-size: 15px; }
        .rule-box b { color: var(--accent); }
        .rule-box ul { margin: 5px 0; padding-left: 20px; }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .menu-btn { padding: 12px 30px; border: none; background: var(--accent); color: #000; font-weight: bold; cursor: pointer; border-radius: 50px; font-size: 16px; transition: 0.3s; }
        .menu-btn.pro { background: #e67e22; color: white; }
        .menu-btn.abs { background: #c0392b; color: white; box-shadow: 0 0 15px rgba(192,57,43,0.6); }
        
        #court { flex: 1; position: relative; background: var(--table); border: 12px solid var(--line); margin: 10px 40px; perspective: 1500px; overflow: hidden; cursor: none; }
        #net-container { position: absolute; top: 50%; width: 100%; height: 40px; transform: translateY(-100%); z-index: 5; pointer-events: none; }
        #net-mesh { width: 100%; height: 28px; background: repeating-linear-gradient(90deg, transparent, transparent 4px, rgba(255,255,255,0.3) 4px, rgba(255,255,255,0.3) 5px), rgba(255,255,255,0.1); border-top: 4px solid #fff; }
        #hud { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; font-size: 28px; font-weight: 900; z-index: 30; pointer-events: none; }
        #ball { position: absolute; width: 18px; height: 18px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); z-index: 10; box-shadow: inset -3px -3px 6px rgba(0,0,0,0.3); }
        #ball-shadow { position: absolute; width: 20px; height: 10px; background: rgba(0,0,0,0.8); border-radius: 50%; transform: translate(-50%, -50%); z-index: 4; pointer-events: none; }
        .paddle { position: absolute; width: 100px; height: 120px; transform: translate(-50%, -50%); z-index: 20; pointer-events: none; }
        #msg { position: absolute; top: 50%; width: 100%; text-align: center; font-size: 50px; color: #ffeb3b; font-weight: 900; display: none; z-index: 40; text-shadow: 0 0 30px #000; }
    </style>
</head>
<body>

<div id="menu">
    <h1>🏓 ITTF PRO MASTERS</h1>
    <div class="rule-box">
        <h3>[ 주요 규칙 및 드라이브 강화 ]</h3>
        <ul>
            <li><b>⚠️ 자기 테이블 반칙:</b> 랠리 중 친 공이 본인 코트에 먼저 닿으면 즉시 실점합니다.</li>
            <li><b>☄️ 드라이브 파워 업:</b> 좌클릭 공격의 비거리와 위력이 상향되었습니다. 상대 코트 깊숙이 꽂힙니다.</li>
            <li><b>🛡️ 수비 강화:</b> 커트 바운스가 더 안정적으로 개선되어 랠리가 길어집니다.</li>
        </ul>
        <p style="margin-top:10px; font-size:12px; color:var(--accent);">* CPU도 강화된 드라이브와 정식 규칙을 준수하며 플레이합니다.</p>
    </div>
    <div class="btn-group">
        <button class="menu-btn" onclick="startGame('easy')">초보자</button>
        <button class="menu-btn pro" onclick="startGame('pro')">프로</button>
        <button class="menu-btn abs" onclick="startGame('abs')">절대자</button>
    </div>
</div>

<div id="hud">
    <div style="color: #ff4444;">YOU <span id="us">0</span></div>
    <div id="status" style="font-size: 18px; color: #aaa;">READY</div>
    <div style="color: #4444ff;">CPU <span id="cs">0</span></div>
</div>

<div id="court">
    <div id="net-container"><div id="net-mesh"></div></div>
    <div id="ball-shadow"></div>
    <div id="ball"></div>
    <div id="msg"></div>
    <svg id="user-pad" class="paddle" viewBox="0 0 100 120">
        <rect x="42" y="80" width="16" height="40" fill="#5d4037" rx="2"/><circle cx="50" cy="45" r="45" fill="#d32f2f" stroke="#000" stroke-width="2"/>
    </svg>
    <svg id="cpu-pad" class="paddle" viewBox="0 0 100 120">
        <rect x="42" y="0" width="16" height="40" fill="#5d4037" rx="2"/><circle cx="50" cy="75" r="45" fill="#1976d2" stroke="#000" stroke-width="2"/>
    </svg>
</div>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(f, d) {
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.setValueAtTime(f, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
    o.start(); o.stop(audioCtx.currentTime + d);
}

const court = document.getElementById('court');
const ballEl = document.getElementById('ball');
const shadowEl = document.getElementById('ball-shadow');
const userEl = document.getElementById('user-pad');
const cpuEl = document.getElementById('cpu-pad');
const msgEl = document.getElementById('msg');
const statusEl = document.getElementById('status');

let state = {
    running: false, score: { u: 0, c: 0 },
    ball: { x: 0, y: 0, z: 0, dx: 0, dy: 0, dz: 0 },
    user: { x: 0, y: 0, vx: 0, vy: 0, prevX: 0, prevY: 0 },
    cpu: { x: 0, y: 0, reactionDelay: 0, speed: 0.04, delayLimit: 0.3, mode: 'easy' },
    gameState: 'WAIT_SERVE', server: 'user', serveCount: 0,
    lastHitter: '', bounceHistory: [], spinType: 'none', isServeMode: false
};

function startGame(diff) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    state.cpu.mode = diff;
    if (diff === 'abs') { state.cpu.speed = 0.19; state.cpu.delayLimit = 0.01; }
    else if (diff === 'pro') { state.cpu.speed = 0.13; state.cpu.delayLimit = 0.07; }
    else { state.cpu.speed = 0.07; state.cpu.delayLimit = 0.20; }
    document.getElementById('menu').style.display = 'none';
    state.score = { u: 0, c: 0 }; state.server = 'user';
    document.getElementById('us').innerText = "0"; document.getElementById('cs').innerText = "0";
    resetRound();
}

function resetRound() {
    const { u, c } = state.score;
    if ((u >= 11 || c >= 11) && Math.abs(u - c) >= 2) {
        state.running = false; document.getElementById('menu').style.display = 'flex'; return;
    }
    state.running = true; state.gameState = 'WAIT_SERVE'; state.bounceHistory = [];
    state.lastHitter = ''; state.spinType = 'none'; state.isServeMode = false;
    if (state.server === 'user') {
        state.ball = { x: W()/2, y: H()-80, z: 20, dx: 0, dy: 0, dz: 0 };
        statusEl.innerText = "YOUR SERVE";
    } else {
        state.ball = { x: W()/2, y: 80, z: 20, dx: 0, dy: 0, dz: 0 };
        statusEl.innerText = "CPU SERVE"; setTimeout(() => cpuServe(), 1000);
    }
    if (!loopId) loop();
}

let loopId;
function loop() {
    if (!state.running) { loopId = null; return; }
    loopId = requestAnimationFrame(loop);
    if (state.gameState !== 'WAIT_SERVE') {
        state.ball.x += state.ball.dx; state.ball.y += state.ball.dy;
        state.ball.dz -= 0.28; 
        state.ball.z += state.ball.dz;

        if (Math.abs(state.ball.y - H()/2) < 8 && state.ball.z < 28) {
            playSound(150, 0.2); state.running = false; msgEl.innerText = "NET!";
            msgEl.style.display = 'block'; setTimeout(() => endPoint(state.lastHitter === 'cpu'), 1000); return;
        }
    }
    if (state.ball.z <= 0) {
        state.ball.z = 0;
        let bFactor = (state.spinType === 'drive') ? 0.92 : (state.spinType === 'cut' ? 0.55 : 0.65);
        state.ball.dz = Math.abs(state.ball.dz) * bFactor;
        const isUserSide = state.ball.y > H()/2;
        const inTable = (state.ball.x > 0 && state.ball.x < W() && state.ball.y > 0 && state.ball.y < H());
        
        if (inTable) {
            state.bounceHistory.push(isUserSide ? 'USER' : 'CPU');
            playSound(450, 0.08);
            
            // [정식 규칙 적용: 랠리 중 본인 테이블 바운스 시 실점]
            if (!state.isServeMode && state.gameState === 'RALLY') {
                if (state.lastHitter === 'user' && isUserSide) {
                    state.running = false; msgEl.innerText = "FOUL!"; msgEl.style.display = 'block';
                    setTimeout(() => endPoint(false), 1000); return;
                }
                if (state.lastHitter === 'cpu' && !isUserSide) {
                    state.running = false; msgEl.innerText = "FOUL!"; msgEl.style.display = 'block';
                    setTimeout(() => endPoint(true), 1000); return;
                }
            }

            if (state.bounceHistory.length >= 2 && state.bounceHistory.slice(-1)[0] === state.bounceHistory.slice(-2)[0]) {
                state.running = false; msgEl.innerText = "2 BOUND!"; msgEl.style.display = 'block';
                setTimeout(() => endPoint(state.bounceHistory.slice(-1)[0] === 'CPU'), 1000); return;
            }
        } else {
            state.running = false; msgEl.innerText = "MISS!"; msgEl.style.display = 'block';
            setTimeout(() => determinePoint(), 1000);
        }
    }

    if (state.ball.dy < 0) {
        state.cpu.reactionDelay += 0.016;
        if (state.cpu.reactionDelay > state.cpu.delayLimit) { 
            let targetX = state.ball.x + (state.ball.dx * 2.1); 
            state.cpu.x += (targetX - state.cpu.x) * state.cpu.speed; 
        }
    } else {
        state.cpu.reactionDelay = 0; state.cpu.x += (W()/2 - state.cpu.x) * 0.02; 
    }
    state.cpu.y = 80;

    if (state.ball.z > 0 && state.ball.z < 85 && state.ball.y > H()/2) {
        let speed = Math.hypot(state.user.vx, state.user.vy);
        if (Math.hypot(state.ball.x - state.user.x, state.ball.y - state.user.y) < 70 && speed > 2.5) {
            if (state.gameState === 'TOSSING' || (state.gameState === 'RALLY' && state.ball.dy > 0)) hitBall('user', speed);
        }
    }
    if (state.ball.y < 165 && state.ball.dy < 0 && state.ball.z < 85 && state.ball.z > 5) {
        if (Math.abs(state.ball.x - state.cpu.x) < 55) hitBall('cpu', 10);
    }
    draw();
}

function determinePoint() {
    const bh = state.bounceHistory; const lastH = state.lastHitter;
    if (state.isServeMode) {
        if (lastH === 'user') endPoint(bh[0] === 'USER' && bh[1] === 'CPU');
        else endPoint(!(bh[0] === 'CPU' && bh[1] === 'USER'));
    } else {
        if (lastH === 'user') endPoint(bh.includes('CPU'));
        else endPoint(!bh.includes('USER'));
    }
}

function hitBall(hitter, swingSpeed) {
    const isServe = state.gameState === 'TOSSING' || (hitter === 'cpu' && state.gameState === 'CPU_SERVE_TOSS');
    state.gameState = 'RALLY'; state.lastHitter = hitter; state.isServeMode = isServe;
    playSound(600, 0.1);
    
    if (hitter === 'user') {
        state.ball.dx = Math.max(-14, Math.min(14, state.user.vx * 0.65));
        
        if (mouseButtons === 1) { // [드라이브 위력 상향]
            state.spinType = 'drive'; 
            // 전진 속도를 높여 상대 코트 깊숙이 떨어지도록 함
            state.ball.dy = -Math.min(48, 28 + (swingSpeed * 0.6)); 
            state.ball.dz = 8.5; // 안정적으로 네트를 넘도록 궤적 상향
        } else if (mouseButtons === 2) { // 커트
            state.spinType = 'cut'; state.ball.dy = -15 - (swingSpeed * 0.3); state.ball.dz = 5.2;
        } else if (swingSpeed > 28) { // 스매시
            state.spinType = 'smash';
            let smashPower = Math.min(62, swingSpeed * 1.55);
            if (smashPower > 50 && smashPower < 62) smashPower = 49 + Math.random(); 
            state.ball.dy = -smashPower; state.ball.dz = 2.4;
        } else {
            state.spinType = 'none'; state.ball.dy = -19; state.ball.dz = 5.2;
        }
        if (isServe) { state.ball.dy = -13.5; state.ball.dz = state.ball.z < 25 ? -2.8 : -4.2; }
    } else {
        let rand = Math.random();
        state.ball.dx = (Math.random() - 0.5) * (isServe ? 5 : (state.cpu.mode === 'abs' ? 18 : 12));
        
        if (!isServe) {
            let maxCpuDY = (state.cpu.mode === 'abs') ? 38 : 33;
            if (rand < 0.38) { // CPU 스매시
                state.spinType = 'smash'; state.ball.dy = 26 + Math.random() * 12; state.ball.dz = 2.0;
            } else if (rand < 0.68) { // CPU 커트
                state.spinType = 'cut'; state.ball.dy = 14 + Math.random() * 6; state.ball.dz = 5.2;
            } else { // CPU 드라이브
                state.spinType = 'drive'; state.ball.dy = 22 + Math.random() * 14; state.ball.dz = 8.0;
            }
            if (state.ball.dy > maxCpuDY) state.ball.dy = maxCpuDY - Math.random() * 2;
        } else {
            state.ball.dy = 12.5; state.ball.dz = -3.2;
        }
    }
    state.bounceHistory = [];
}

function cpuServe() {
    if (state.gameState !== 'WAIT_SERVE') return;
    state.gameState = 'CPU_SERVE_TOSS'; state.ball.dz = 8.5;
    setTimeout(() => hitBall('cpu', 10), 700);
}

function endPoint(userWin) {
    state.running = false; playSound(userWin ? 800 : 200, 0.3);
    userWin ? state.score.u++ : state.score.c++;
    document.getElementById('us').innerText = state.score.u;
    document.getElementById('cs').innerText = state.score.c;
    state.serveCount++;
    if ((state.score.u >= 10 && state.score.c >= 10) || state.serveCount >= 2) { 
        state.server = (state.server === 'user') ? 'cpu' : 'user'; state.serveCount = 0; 
    }
    setTimeout(() => { msgEl.style.display = 'none'; resetRound(); }, 1200);
}

function draw() {
    ballEl.style.left = state.ball.x + 'px'; ballEl.style.top = (state.ball.y - state.ball.z) + 'px';
    shadowEl.style.left = state.ball.x + 'px'; shadowEl.style.top = state.ball.y + 'px';
    let sScale = Math.max(0.3, 1.0 - state.ball.z/120);
    shadowEl.style.transform = `translate(-50%, -50%) scale(${sScale})`;
    shadowEl.style.opacity = state.ball.z < 5 ? 0.9 : Math.max(0.2, 0.7 - state.ball.z/150);
    userEl.style.left = state.user.x + 'px'; userEl.style.top = state.user.y + 'px';
    cpuEl.style.left = state.cpu.x + 'px'; cpuEl.style.top = state.cpu.y + 'px';
}

let mouseButtons = 0;
window.addEventListener('mousedown', e => {
    mouseButtons = e.buttons;
    if (state.gameState === 'WAIT_SERVE' && state.server === 'user') { state.gameState = 'TOSSING'; state.ball.dz = 8; }
});
window.addEventListener('mouseup', () => mouseButtons = 0);
window.addEventListener('contextmenu', e => e.preventDefault());

court.addEventListener('mousemove', e => {
    const rect = court.getBoundingClientRect();
    state.user.x = e.clientX - rect.left;
    state.user.y = Math.max(H()/2 + 110, e.clientY - rect.top);
    state.user.vx = state.user.x - state.user.prevX; state.user.vy = state.user.y - state.user.prevY;
    state.user.prevX = state.user.x; state.user.prevY = state.user.y;
});
const W = () => court.clientWidth; const H = () => court.clientHeight;
</script>
</body>
</html>
