<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>프로 탁구 시뮬레이터 - 복구 버전</title>
    <style>
        :root { --table: #1e5d2f; --line: #ffffff; }
        body { margin: 0; background: #000; overflow: hidden; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; touch-action: none; color: white; }
        
        /* 초기 타이틀 화면 */
        #menu { position: absolute; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .menu-btn { padding: 15px 40px; border: 2px solid #f1c40f; background: transparent; color: #f1c40f; font-weight: bold; cursor: pointer; border-radius: 30px; margin: 10px; font-size: 18px; }

        #court { flex: 1; position: relative; background: var(--table); border: 10px solid var(--line); margin: 5px; perspective: 1200px; overflow: hidden; cursor: none; }
        #net { position: absolute; top: 50%; width: 100%; height: 4px; background: rgba(255,255,255,0.7); border-top: 1px solid #fff; z-index: 5; }
        
        #hud { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-around; font-size: 24px; font-weight: bold; z-index: 30; pointer-events: none; text-shadow: 2px 2px 4px #000; }
        #ball { position: absolute; width: 18px; height: 18px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); z-index: 10; box-shadow: 0 4px 8px rgba(0,0,0,0.4); }
        .paddle { position: absolute; width: 110px; height: 130px; transform: translate(-50%, -50%); z-index: 20; pointer-events: none; }
        #msg { position: absolute; top: 60%; width: 100%; text-align: center; font-size: 35px; color: #ffeb3b; font-weight: bold; display: none; z-index: 40; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="menu">
    <h1 style="color:#f1c40f; font-size: 40px; margin-bottom: 20px;">🏓 탁구 마스터즈</h1>
    <p style="color: #ccc; margin-bottom: 30px;">준비가 되면 시작 버튼을 누르세요</p>
    <button class="menu-btn" onclick="startGame()">게임 시작</button>
</div>

<div id="hud">
    <div>나 <span id="us">0</span></div>
    <div id="status">대기</div>
    <div>상대 <span id="cs">0</span></div>
</div>

<div id="court">
    <div id="net"></div>
    <div id="ball"></div>
    <div id="msg">OUT</div>
    
    <svg id="user-pad" class="paddle" viewBox="0 0 100 120">
        <rect x="42" y="80" width="16" height="40" fill="#8d6e63" rx="2"/>
        <circle cx="50" cy="45" r="45" fill="#d32f2f" stroke="#333" stroke-width="3"/>
    </svg>
    <svg id="cpu-pad" class="paddle" viewBox="0 0 100 120">
        <rect x="42" y="0" width="16" height="40" fill="#8d6e63" rx="2"/>
        <circle cx="50" cy="75" r="45" fill="#1976d2" stroke="#333" stroke-width="3"/>
    </svg>
</div>

<script>
const court = document.getElementById('court');
const ballEl = document.getElementById('ball');
const userEl = document.getElementById('user-pad');
const cpuEl = document.getElementById('cpu-pad');
const msgEl = document.getElementById('msg');
const statusEl = document.getElementById('status');

let state = {
    running: false,
    score: { u: 0, c: 0 },
    ball: { x: 0, y: 0, z: 0, dx: 0, dy: 0, dz: 0, spin: 'none' },
    user: { x: 0, y: 0, vx: 0, vy: 0, prevX: 0, prevY: 0 },
    cpu: { x: 0, y: 0 },
    gameState: 'WAIT_SERVE',
    lastHitter: '',
    bounces: 0
};

// 게임 시작 함수
function startGame() {
    document.getElementById('menu').style.display = 'none';
    resetRound();
}

function resetRound() {
    state.running = true;
    state.gameState = 'WAIT_SERVE';
    state.bounces = 0;
    state.ball = { x: W()/2, y: H()-100, z: 25, dx: 0, dy: 0, dz: 0, spin: 'none' };
    state.lastHitter = '';
    statusEl.innerText = "서브 대기 (클릭하여 토스)";
    draw();
    if (!loopId) loop();
}

let loopId;
function loop() {
    if (!state.running) {
        loopId = null;
        return;
    }
    loopId = requestAnimationFrame(loop);

    if (state.gameState !== 'WAIT_SERVE') {
        state.ball.x += state.ball.dx;
        state.ball.y += state.ball.dy;
        state.ball.dz -= 0.22;
        state.ball.z += state.ball.dz;
    }

    if (Math.abs(state.ball.y - H()/2) < 10 && state.ball.z < 12) {
        endPoint(state.lastHitter === 'cpu');
        return;
    }

    if (state.ball.z <= 0) {
        state.ball.z = 0;
        state.ball.dz = Math.abs(state.ball.dz) * 0.7;
        state.bounces++;
        const isUserSide = state.ball.y > H()/2;
        if (state.gameState === 'TOSSING') {
            if (!isUserSide) endPoint(false);
        } else {
            if (state.bounces > 1) endPoint(state.lastHitter === 'user');
        }
    }

    if (state.ball.z < 70 && state.ball.z > 0 && state.ball.y > H()/2) {
        let dist = Math.hypot(state.ball.x - state.user.x, state.ball.y - state.user.y);
        let speed = Math.hypot(state.user.vx, state.user.vy);
        if (dist < 65 && speed > 2) {
            if (state.gameState === 'TOSSING' || (state.gameState === 'RALLY' && state.ball.dy > 0)) {
                hitBall('user', speed);
            }
        }
    }

    state.cpu.x += (state.ball.x - state.cpu.x) * 0.12;
    state.cpu.y = 80;
    if (state.ball.y < 120 && state.ball.dy < 0 && state.ball.z < 60) {
        if (Math.abs(state.ball.x - state.cpu.x) < 65) {
            hitBall('cpu', 10);
        } else if (state.ball.y < 30) {
            endPoint(true);
        }
    }

    if (state.ball.y < -100 || state.ball.y > H() + 100 || state.ball.x < -100 || state.ball.x > W() + 100) {
        endPoint(state.lastHitter === 'user' && state.bounces > 0);
    }
    draw();
}

function hitBall(hitter, swingSpeed) {
    state.lastHitter = hitter;
    state.bounces = 0;
    state.gameState = 'RALLY';
    statusEl.innerText = "랠리!";

    if (hitter === 'user') {
        let power = swingSpeed * 1.5;
        state.ball.dx = (state.user.x - state.user.prevX) * 0.7;
        state.ball.dy = -Math.max(power, 15);
        state.ball.dz = 5;
    } else {
        state.ball.dy = 11 + Math.random() * 8;
        state.ball.dz = 5;
        state.ball.dx = (Math.random() - 0.5) * 10;
    }
}

function draw() {
    ballEl.style.left = state.ball.x + 'px';
    ballEl.style.top = (state.ball.y - state.ball.z) + 'px';
    ballEl.style.transform = `translate(-50%, -50%) scale(${1 + state.ball.z/150})`;
    userEl.style.left = state.user.x + 'px';
    userEl.style.top = state.user.y + 'px';
    cpuEl.style.left = state.cpu.x + 'px';
    cpuEl.style.top = state.cpu.y + 'px';
}

window.addEventListener('mousedown', e => {
    if (state.gameState === 'WAIT_SERVE' && document.getElementById('menu').style.display === 'none') {
        state.gameState = 'TOSSING';
        state.ball.dz = 7.5;
        statusEl.innerText = "서브!";
    }
});

court.addEventListener('mousemove', e => {
    const rect = court.getBoundingClientRect();
    state.user.x = e.clientX - rect.left;
    state.user.y = Math.max(H()/2 + 60, e.clientY - rect.top);
    state.user.vx = state.user.x - state.user.prevX;
    state.user.vy = state.user.y - state.user.prevY;
    state.user.prevX = state.user.x;
    state.user.prevY = state.user.y;
});

function endPoint(userWin) {
    state.running = false;
    userWin ? state.score.u++ : state.score.c++;
    document.getElementById('us').innerText = state.score.u;
    document.getElementById('cs').innerText = state.score.c;
    msgEl.innerText = userWin ? "득점!" : "실점!";
    msgEl.style.display = 'block';
    setTimeout(() => {
        msgEl.style.display = 'none';
        resetRound();
    }, 1200);
}

const W = () => court.clientWidth;
const H = () => court.clientHeight;
</script>
</body>
</html>
