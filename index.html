<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ITTF Pro Masters v10.1</title>
    <style>
        :root { --table: #1e5d2f; --line: #ffffff; --accent: #f1c40f; }
        body { margin: 0; background: #111; overflow: hidden; display: flex; flex-direction: column; height: 100vh; font-family: 'Pretendard', sans-serif; touch-action: none; color: white; }
        #menu { position: absolute; inset: 0; background: rgba(0,0,0,0.98); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        #menu h1 { color: var(--accent); font-size: 42px; margin-bottom: 10px; text-shadow: 0 0 20px rgba(241,196,15,0.5); }
        .rule-box { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 15px; max-width: 500px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.1); line-height: 1.7; font-size: 14px; color: #ccc; text-align: left; }
        .rule-box b { color: var(--accent); }
        .menu-btn { padding: 15px 60px; border: none; background: var(--accent); color: #000; font-weight: bold; cursor: pointer; border-radius: 50px; font-size: 18px; transition: 0.3s; }
        
        #court { flex: 1; position: relative; background: var(--table); border: 12px solid var(--line); margin: 10px 40px; perspective: 1500px; overflow: hidden; cursor: none; }
        #net-container { position: absolute; top: 50%; width: 100%; height: 40px; transform: translateY(-100%); z-index: 5; pointer-events: none; }
        #net-mesh { width: 100%; height: 28px; background: repeating-linear-gradient(90deg, transparent, transparent 4px, rgba(255,255,255,0.3) 4px, rgba(255,255,255,0.3) 5px), rgba(255,255,255,0.1); border-top: 4px solid #fff; }
        #net-shadow { width: 100%; height: 10px; background: rgba(0,0,0,0.3); filter: blur(5px); }

        #hud { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; font-size: 28px; font-weight: 900; z-index: 30; pointer-events: none; }
        #ball { position: absolute; width: 18px; height: 18px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); z-index: 10; box-shadow: inset -3px -3px 6px rgba(0,0,0,0.3); }
        #ball-shadow { position: absolute; width: 20px; height: 10px; background: rgba(0,0,0,0.8); border-radius: 50%; transform: translate(-50%, -50%); z-index: 4; pointer-events: none; }
        .paddle { position: absolute; width: 100px; height: 120px; transform: translate(-50%, -50%); z-index: 20; pointer-events: none; }
        #msg { position: absolute; top: 50%; width: 100%; text-align: center; font-size: 50px; color: #ffeb3b; font-weight: 900; display: none; z-index: 40; text-shadow: 0 0 30px #000; }
    </style>
</head>
<body>

<div id="menu">
    <h1 id="menu-title">🏓 ITTF PRO MASTERS</h1>
    <div class="rule-box" id="rule-content">
        <b>[ 조작법 ]</b><br>
        • <b>서브:</b> 클릭으로 공 토스 후 스윙.<br>
        • <b>드라이브:</b> 좌클릭 유지 (강공) / <b>커트:</b> 우클릭 유지 (수비).<br><br>
        <b>[ 판정 규칙 ]</b><br>
        • <b>NET:</b> 네트에 걸려 공이 넘어가지 못한 경우.<br>
        • <b>2 BOUND:</b> 자기 코트에서 공이 두 번 튕긴 경우.<br>
        • <b>MISS:</b> 테이블 밖으로 공이 나간 경우.
    </div>
    <button class="menu-btn" onclick="startGame()">경기 시작</button>
</div>

<div id="hud">
    <div style="color: #ff4444;">YOU <span id="us">0</span></div>
    <div id="status" style="font-size: 18px; color: #aaa;">READY</div>
    <div style="color: #4444ff;">CPU <span id="cs">0</span></div>
</div>

<div id="court">
    <div id="net-container"><div id="net-mesh"></div><div id="net-shadow"></div></div>
    <div id="ball-shadow"></div>
    <div id="ball"></div>
    <div id="msg"></div>
    
    <svg id="user-pad" class="paddle" viewBox="0 0 100 120">
        <rect x="42" y="80" width="16" height="40" fill="#5d4037" rx="2"/>
        <circle cx="50" cy="45" r="45" fill="#d32f2f" stroke="#000" stroke-width="2"/>
    </svg>
    <svg id="cpu-pad" class="paddle" viewBox="0 0 100 120">
        <rect x="42" y="0" width="16" height="40" fill="#5d4037" rx="2"/>
        <circle cx="50" cy="75" r="45" fill="#1976d2" stroke="#000" stroke-width="2"/>
    </svg>
</div>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(f, d) {
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.setValueAtTime(f, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
    o.start(); o.stop(audioCtx.currentTime + d);
}

const court = document.getElementById('court');
const ballEl = document.getElementById('ball');
const shadowEl = document.getElementById('ball-shadow');
const userEl = document.getElementById('user-pad');
const cpuEl = document.getElementById('cpu-pad');
const msgEl = document.getElementById('msg');
const statusEl = document.getElementById('status');

let state = {
    running: false, score: { u: 0, c: 0 },
    ball: { x: 0, y: 0, z: 0, dx: 0, dy: 0, dz: 0 },
    user: { x: 0, y: 0, vx: 0, vy: 0, prevX: 0, prevY: 0 },
    cpu: { x: 0, y: 0, reactionDelay: 0 },
    gameState: 'WAIT_SERVE', server: 'user', serveCount: 0,
    lastHitter: '', bounceHistory: [], spinType: 'none', isServeMode: false
};

function startGame() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    document.getElementById('menu').style.display = 'none';
    state.score = { u: 0, c: 0 }; state.server = 'user';
    document.getElementById('us').innerText = "0"; document.getElementById('cs').innerText = "0";
    resetRound();
}

function resetRound() {
    const { u, c } = state.score;
    if ((u >= 11 || c >= 11) && Math.abs(u - c) >= 2) {
        state.running = false;
        document.getElementById('menu').style.display = 'flex';
        document.getElementById('menu-title').innerText = u > c ? "YOU WIN!" : "GAME OVER";
        return;
    }

    state.running = true; state.gameState = 'WAIT_SERVE'; state.bounceHistory = [];
    state.lastHitter = ''; state.spinType = 'none'; state.isServeMode = false;
    
    if (state.server === 'user') {
        state.ball = { x: W()/2, y: H()-80, z: 20, dx: 0, dy: 0, dz: 0 };
        statusEl.innerText = "YOUR SERVE";
    } else {
        state.ball = { x: W()/2, y: 80, z: 20, dx: 0, dy: 0, dz: 0 };
        statusEl.innerText = "CPU SERVE";
        setTimeout(() => cpuServe(), 1200);
    }
    if (!loopId) loop();
}

let loopId;
function loop() {
    if (!state.running) { loopId = null; return; }
    loopId = requestAnimationFrame(loop);

    if (state.gameState !== 'WAIT_SERVE') {
        state.ball.x += state.ball.dx;
        state.ball.y += state.ball.dy;
        state.ball.dz -= 0.25; 
        state.ball.z += state.ball.dz;
        
        // [NET 판정 개선]
        if (Math.abs(state.ball.y - H()/2) < 8 && state.ball.z < 28) {
            playSound(150, 0.2);
            state.running = false;
            msgEl.innerText = "NET!";
            msgEl.style.display = 'block';
            setTimeout(() => endPoint(state.lastHitter === 'cpu'), 1000);
            return;
        }
    }

    if (state.ball.z <= 0) {
        state.ball.z = 0;
        let bFactor = (state.lastHitter === 'user' && state.spinType === 'drive') ? 0.85 : 0.6;
        if (state.spinType === 'cut') { state.ball.dx *= 0.7; state.ball.dy *= 0.8; }
        state.ball.dz = Math.abs(state.ball.dz) * bFactor;
        
        const isUserSide = state.ball.y > H()/2;
        const inTable = (state.ball.x > 0 && state.ball.x < W() && state.ball.y > 0 && state.ball.y < H());

        if (inTable) {
            state.bounceHistory.push(isUserSide ? 'USER' : 'CPU');
            playSound(450, 0.08);
            ballEl.style.transform = `translate(-50%, -50%) scale(1.4)`;
            setTimeout(() => { ballEl.style.transform = `translate(-50%, -50%) scale(1.0)`; }, 50);

            // [2 BOUND 판정 개선]
            const bh = state.bounceHistory;
            if (bh.length >= 2) {
                const last = bh[bh.length-1];
                const prev = bh[bh.length-2];
                if (last === prev) {
                    state.running = false;
                    msgEl.innerText = "2 BOUND!";
                    msgEl.style.display = 'block';
                    setTimeout(() => endPoint(last === 'CPU'), 1000);
                    return;
                }
            }
        } else {
            // [MISS 판정 개선]
            state.running = false;
            msgEl.innerText = "MISS!";
            msgEl.style.display = 'block';
            setTimeout(() => determinePoint(), 1000);
        }
    }

    // CPU 제어 (느린 이동)
    if (state.ball.dy < 0) {
        state.cpu.reactionDelay += 0.016;
        if (state.cpu.reactionDelay > 0.3) { 
            let targetX = state.ball.x + (state.ball.dx * 2); 
            state.cpu.x += (targetX - state.cpu.x) * 0.04; 
        }
    } else {
        state.cpu.reactionDelay = 0;
        state.cpu.x += (W()/2 - state.cpu.x) * 0.02; 
    }
    state.cpu.y = 80;

    // 타격
    if (state.ball.z > 0 && state.ball.z < 85 && state.ball.y > H()/2) {
        let dist = Math.hypot(state.ball.x - state.user.x, state.ball.y - state.user.y);
        let speed = Math.hypot(state.user.vx, state.user.vy);
        if (dist < 65 && speed > 2.5) {
            if (state.gameState === 'TOSSING' || (state.gameState === 'RALLY' && state.ball.dy > 0)) hitBall('user', speed);
        }
    }
    if (state.ball.y < 150 && state.ball.dy < 0 && state.ball.z < 70 && state.ball.z > 5) {
        if (Math.abs(state.ball.x - state.cpu.x) < 55) {
            let failProb = (state.spinType === 'cut') ? 0.3 : 0.1;
            if (state.gameState === 'RALLY' && Math.random() < failProb) return; 
            hitBall('cpu', 10);
        }
    }
    draw();
}

function determinePoint() {
    const bh = state.bounceHistory;
    const lastH = state.lastHitter;
    if (state.isServeMode) {
        if (lastH === 'user') endPoint(bh[0] === 'USER' && bh[1] === 'CPU');
        else endPoint(!(bh[0] === 'CPU' && bh[1] === 'USER'));
    } else {
        if (lastH === 'user') endPoint(bh.includes('CPU'));
        else endPoint(!bh.includes('USER'));
    }
}

function hitBall(hitter, swingSpeed) {
    const isServe = state.gameState === 'TOSSING' || (hitter === 'cpu' && state.gameState === 'CPU_SERVE_TOSS');
    state.gameState = 'RALLY';
    state.lastHitter = hitter;
    state.isServeMode = isServe;
    playSound(600, 0.1);

    if (hitter === 'user') {
        state.ball.dx = Math.max(-12, Math.min(12, state.user.vx * 0.6));
        if (mouseButtons === 1) { state.spinType = 'drive'; state.ball.dy = -swingSpeed * 1.25; state.ball.dz = 5.5; }
        else if (mouseButtons === 2) { state.spinType = 'cut'; state.ball.dy = -swingSpeed * 0.85; state.ball.dz = 3.8; }
        else { state.spinType = 'none'; state.ball.dy = -18; state.ball.dz = 4.5; }
        
        if (isServe) { state.ball.dy = -13; state.ball.dz = state.ball.z < 25 ? -2.5 : -4; }
    } else {
        state.ball.dx = (Math.random() - 0.5) * (isServe ? 6 : 12);
        state.ball.dy = isServe ? 12 : 14 + Math.random() * 8;
        state.ball.dz = isServe ? -3.2 : 5;
    }
    state.bounceHistory = [];
}

function cpuServe() {
    if (state.gameState !== 'WAIT_SERVE') return;
    state.gameState = 'CPU_SERVE_TOSS';
    state.ball.dz = 8;
    setTimeout(() => hitBall('cpu', 10), 700);
}

function endPoint(userWin) {
    state.running = false;
    playSound(userWin ? 800 : 200, 0.3);
    userWin ? state.score.u++ : state.score.c++;
    document.getElementById('us').innerText = state.score.u;
    document.getElementById('cs').innerText = state.score.c;

    state.serveCount++;
    const isDeuce = state.score.u >= 10 && state.score.c >= 10;
    if (isDeuce || state.serveCount >= 2) {
        state.server = (state.server === 'user') ? 'cpu' : 'user';
        state.serveCount = 0;
    }
    
    setTimeout(() => { msgEl.style.display = 'none'; resetRound(); }, 1200);
}

function draw() {
    ballEl.style.left = state.ball.x + 'px';
    ballEl.style.top = (state.ball.y - state.ball.z) + 'px';
    shadowEl.style.left = state.ball.x + 'px';
    shadowEl.style.top = state.ball.y + 'px';
    let sScale = Math.max(0.3, 1.0 - state.ball.z/120);
    shadowEl.style.transform = `translate(-50%, -50%) scale(${sScale})`;
    shadowEl.style.opacity = state.ball.z < 5 ? 0.9 : Math.max(0.2, 0.7 - state.ball.z/150);
    userEl.style.left = state.user.x + 'px';
    userEl.style.top = state.user.y + 'px';
    cpuEl.style.left = state.cpu.x + 'px';
    cpuEl.style.top = state.cpu.y + 'px';
}

let mouseButtons = 0;
window.addEventListener('mousedown', e => {
    mouseButtons = e.buttons;
    if (state.gameState === 'WAIT_SERVE' && state.server === 'user') { state.gameState = 'TOSSING'; state.ball.dz = 8; }
});
window.addEventListener('mouseup', () => mouseButtons = 0);
court.addEventListener('mousemove', e => {
    const rect = court.getBoundingClientRect();
    state.user.x = e.clientX - rect.left;
    state.user.y = Math.max(H()/2 + 110, e.clientY - rect.top);
    state.user.vx = state.user.x - state.user.prevX;
    state.user.vy = state.user.y - state.user.prevY;
    state.user.prevX = state.user.x; state.user.prevY = state.user.y;
});

const W = () => court.clientWidth;
const H = () => court.clientHeight;
</script>
</body>
</html>
