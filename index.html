<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>정밀 물리 탁구</title>
    <style>
        :root { --table: #1e5d2f; --line: #ffffff; }
        body { margin: 0; background: #000; overflow: hidden; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; touch-action: none; color: white; }
        #menu { position: absolute; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .menu-btn { padding: 15px 40px; border: 2px solid #f1c40f; background: transparent; color: #f1c40f; font-weight: bold; cursor: pointer; border-radius: 30px; margin: 10px; font-size: 18px; }
        #court { flex: 1; position: relative; background: var(--table); border: 10px solid var(--line); margin: 5px; perspective: 1200px; overflow: hidden; cursor: none; }
        #net { position: absolute; top: 50%; width: 100%; height: 4px; background: rgba(255,255,255,0.7); border-top: 1px solid #fff; z-index: 5; }
        #hud { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-around; font-size: 24px; font-weight: bold; z-index: 30; pointer-events: none; }
        #ball { position: absolute; width: 16px; height: 16px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); z-index: 10; box-shadow: 0 4px 8px rgba(0,0,0,0.4); }
        .paddle { position: absolute; width: 110px; height: 130px; transform: translate(-50%, -50%); z-index: 20; pointer-events: none; }
        #msg { position: absolute; top: 60%; width: 100%; text-align: center; font-size: 35px; color: #ffeb3b; font-weight: bold; display: none; z-index: 40; }
        #guide { position: absolute; bottom: 20px; left: 20px; font-size: 13px; color: #ccc; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="menu">
    <h1 style="color:#f1c40f">🏓 정밀 피지컬 탁구</h1>
    <button class="menu-btn" onclick="startGame()">게임 시작</button>
</div>

<div id="hud">
    <div>나 <span id="us">0</span></div>
    <div id="status">대기</div>
    <div>상대 <span id="cs">0</span></div>
</div>

<div id="court">
    <div id="net"></div>
    <div id="ball"></div>
    <div id="msg">OUT</div>
    
    <svg id="user-pad" class="paddle" viewBox="0 0 100 120">
        <rect x="42" y="80" width="16" height="40" fill="#8d6e63" rx="2"/>
        <circle cx="50" cy="45" r="45" fill="#d32f2f" stroke="#333" stroke-width="3"/>
    </svg>
    <svg id="cpu-pad" class="paddle" viewBox="0 0 100 120">
        <rect x="42" y="0" width="16" height="40" fill="#8d6e63" rx="2"/>
        <circle cx="50" cy="75" r="45" fill="#1976d2" stroke="#333" stroke-width="3"/>
    </svg>
</div>

<div id="guide">살살 휘두르면 짧게, 세게 휘두르면 길게 나갑니다. 너무 살살 치면 네트를 못 넘깁니다!</div>

<script>
const court = document.getElementById('court');
const ballEl = document.getElementById('ball');
const userEl = document.getElementById('user-pad');
const cpuEl = document.getElementById('cpu-pad');
const msgEl = document.getElementById('msg');
const statusEl = document.getElementById('status');

let state = {
    running: false, score: { u: 0, c: 0 },
    ball: { x: 0, y: 0, z: 0, dx: 0, dy: 0, dz: 0 },
    user: { x: 0, y: 0, vx: 0, vy: 0, prevX: 0, prevY: 0 },
    cpu: { x: 0, y: 0 },
    gameState: 'WAIT_SERVE', lastHitter: '', bounceHistory: []
};

function startGame() {
    document.getElementById('menu').style.display = 'none';
    resetRound();
}

function resetRound() {
    state.running = true; state.gameState = 'WAIT_SERVE'; state.bounceHistory = [];
    state.ball = { x: W()/2, y: H()-100, z: 25, dx: 0, dy: 0, dz: 0 };
    state.lastHitter = '';
    statusEl.innerText = "서브: 클릭 후 토스";
    if (!loopId) loop();
}

let loopId;
function loop() {
    if (!state.running) { loopId = null; return; }
    loopId = requestAnimationFrame(loop);

    if (state.gameState !== 'WAIT_SERVE') {
        state.ball.x += state.ball.dx;
        state.ball.y += state.ball.dy;
        state.ball.dz -= 0.22; 
        state.ball.z += state.ball.dz;
        
        // 현실적인 공기 저항
        state.ball.dx *= 0.992;
        state.ball.dy *= 0.992;
    }

    // 네트 충돌 판정
    if (Math.abs(state.ball.y - H()/2) < 8 && state.ball.z < 12) {
        if (state.ball.dy !== 0) {
            state.ball.dy *= -0.2; // 네트에 맞고 튕김
            state.ball.dz *= 0.5;
            setTimeout(() => determinePoint(), 500);
            return;
        }
    }

    // 바운드 판정
    if (state.ball.z <= 0) {
        state.ball.z = 0;
        state.ball.dz = Math.abs(state.ball.dz) * 0.55;
        
        const isUserSide = state.ball.y > H()/2;
        const inTable = (state.ball.x > 0 && state.ball.x < W() && state.ball.y > 0 && state.ball.y < H());

        if (inTable) {
            state.bounceHistory.push(isUserSide ? 'USER' : 'CPU');
            checkBounceRules();
        } else {
            determinePoint();
        }
    }

    // 사용자 타격
    if (state.ball.z > 0 && state.ball.z < 85 && state.ball.y > H()/2) {
        let dist = Math.hypot(state.ball.x - state.user.x, state.ball.y - state.user.y);
        let speed = Math.hypot(state.user.vx, state.user.vy);

        if (dist < 65 && speed > 1.5) {
            if (state.gameState === 'TOSSING' || (state.gameState === 'RALLY' && state.ball.dy > 0)) {
                hitBall('user', speed);
            }
        }
    }

    // CPU AI
    state.cpu.x += (state.ball.x - state.cpu.x) * 0.1;
    state.cpu.y = 80;
    if (state.ball.y < 120 && state.ball.dy < 0 && state.ball.z < 60) {
        if (Math.abs(state.ball.x - state.cpu.x) < 60) hitBall('cpu', 8 + Math.random()*4);
    }

    draw();
}

function checkBounceRules() {
    if (state.gameState === 'RALLY') {
        const lastTwo = state.bounceHistory.slice(-2);
        if (lastTwo.length === 2 && lastTwo[0] === lastTwo[1]) {
            endPoint(state.lastHitter === 'cpu');
        }
    }
}

function determinePoint() {
    if (!state.running) return;
    const lastBounce = state.bounceHistory[state.bounceHistory.length - 1];
    
    if (state.lastHitter === 'user') {
        // 내가 쳤을 때: 서브면 반드시 'USER' 다음 'CPU'여야 함
        if (state.bounceHistory[0] === 'USER' && state.bounceHistory[1] === 'CPU') endPoint(true);
        else if (lastBounce === 'CPU') endPoint(true);
        else endPoint(false);
    } else {
        // 상대가 쳤을 때: 마지막이 'USER'면 내 실점, 아니면 내 득점
        endPoint(lastBounce !== 'USER');
    }
}

function hitBall(hitter, swingSpeed) {
    const btn = mouseButtons;
    state.lastHitter = hitter;
    
    if (hitter === 'user') {
        if (state.gameState === 'TOSSING' && state.bounceHistory.length > 0) {
            endPoint(false); return; 
        }

        state.gameState = 'RALLY';
        state.ball.dx = (state.user.x - state.user.prevX) * 0.4;
        
        // 휘두르는 속도(swingSpeed)에 따른 정밀 비거리 계산
        // 5미만: 매우 약함(내 코트), 5~15: 적당함(상대 코트), 20이상: 아웃 위험
        let basePower = swingSpeed * 0.85; 
        
        if (btn === 1) { // 드라이브
            state.ball.dy = -Math.max(basePower * 1.1, 8); 
            state.ball.dz = 5;
        } else if (btn === 2) { // 커트
            state.ball.dy = -Math.max(basePower * 0.6, 5);
            state.ball.dz = 3;
        } else { // 스매시
            state.ball.dy = -Math.max(basePower * 1.3, 12);
            state.ball.dz = 4;
        }
    } else {
        state.gameState = 'RALLY';
        state.ball.dy = 9 + Math.random() * 6;
        state.ball.dz = 5;
        state.ball.dx = (Math.random() - 0.5) * 8;
    }
    state.bounceHistory = [];
}

function draw() {
    ballEl.style.left = state.ball.x + 'px';
    ballEl.style.top = (state.ball.y - state.ball.z) + 'px';
    ballEl.style.transform = `translate(-50%, -50%) scale(${1 + state.ball.z/150})`;
    userEl.style.left = state.user.x + 'px';
    userEl.style.top = state.user.y + 'px';
    cpuEl.style.left = state.cpu.x + 'px';
    cpuEl.style.top = state.cpu.y + 'px';
}

let mouseButtons = 0;
window.addEventListener('mousedown', e => {
    mouseButtons = e.buttons;
    if (state.gameState === 'WAIT_SERVE') {
        state.gameState = 'TOSSING';
        state.ball.dz = 7.5;
        statusEl.innerText = "공중에서 타격!";
    }
});
window.addEventListener('mouseup', () => mouseButtons = 0);

court.addEventListener('mousemove', e => {
    const rect = court.getBoundingClientRect();
    state.user.x = e.clientX - rect.left;
    state.user.y = Math.max(H()/2 + 60, e.clientY - rect.top);
    state.user.vx = state.user.x - state.user.prevX;
    state.user.vy = state.user.y - state.user.prevY;
    state.user.prevX = state.user.x; state.user.prevY = state.user.y;
});

function endPoint(userWin) {
    if (!state.running) return;
    state.running = false;
    userWin ? state.score.u++ : state.score.c++;
    document.getElementById('us').innerText = state.score.u;
    document.getElementById('cs').innerText = state.score.c;
    msgEl.innerText = userWin ? "득점!" : "실점!";
    msgEl.style.display = 'block';
    setTimeout(() => { msgEl.style.display = 'none'; resetRound(); }, 1200);
}

const W = () => court.clientWidth;
const H = () => court.clientHeight;
</script>
</body>
</html>
