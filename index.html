<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ITTF 마스터즈 v5 - Sound Edition</title>
    <style>
        :root { --table: #1e5d2f; --line: #ffffff; --accent: #f1c40f; }
        body { margin: 0; background: #000; overflow: hidden; display: flex; flex-direction: column; height: 100vh; font-family: 'Pretendard', sans-serif; touch-action: none; color: white; }
        
        /* 초기 화면 스타일 */
        #menu { 
            position: absolute; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 20px; text-align: center;
        }
        #menu h1 { color: var(--accent); font-size: 42px; margin-bottom: 10px; text-shadow: 0 0 15px rgba(241, 196, 15, 0.4); }
        
        .rule-box { 
            background: rgba(255,255,255,0.08); padding: 20px; border-radius: 15px; 
            max-width: 450px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.15);
            line-height: 1.7; font-size: 14px; color: #ccc; text-align: left;
        }
        .rule-box b { color: var(--accent); display: block; margin-bottom: 5px; font-size: 16px; }
        
        .menu-btn { 
            padding: 15px 50px; border: 2px solid var(--accent); background: var(--accent); 
            color: #000; font-weight: bold; cursor: pointer; border-radius: 50px; 
            font-size: 18px; transition: all 0.3s;
        }
        .menu-btn:hover { background: transparent; color: var(--accent); transform: scale(1.05); }

        /* 게임 화면 레이아웃 */
        #court { flex: 1; position: relative; background: var(--table); border: 10px solid var(--line); margin: 5px 40px; perspective: 1200px; overflow: hidden; cursor: none; }
        #net { position: absolute; top: 50%; width: 100%; height: 4px; background: rgba(255,255,255,0.7); border-top: 1px solid #fff; z-index: 5; }
        #hud { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-around; font-size: 24px; font-weight: bold; z-index: 30; pointer-events: none; text-shadow: 2px 2px 4px #000; }
        #ball { position: absolute; width: 18px; height: 18px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); z-index: 10; box-shadow: 0 4px 8px rgba(0,0,0,0.4); }
        .paddle { position: absolute; width: 110px; height: 130px; transform: translate(-50%, -50%); z-index: 20; pointer-events: none; }
        #msg { position: absolute; top: 60%; width: 100%; text-align: center; font-size: 35px; color: #ffeb3b; font-weight: bold; display: none; z-index: 40; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="menu">
    <h1>🏓 ITTF MASTERS</h1>
    <div class="rule-box">
        <b>[ 게임 규칙 안내 ]</b>
        • <b>서브권:</b> 2회씩 교대로 서브합니다. (10:10 듀스 시 1회씩 교대)<br>
        • <b>서브 방법:</b> 클릭으로 공을 띄운 뒤 내려올 때 타격하세요. 타점이 너무 높으면 아웃, 낮으면 네트에 걸립니다.<br>
        • <b>승리 조건:</b> 상대방이 친 공이 내 테이블에 닿지 않고 밖으로 나가면 득점합니다.<br>
        • <b>조작:</b> 마우스 이동으로 라켓 조절 (좌클릭: 드라이브 / 우클릭: 커트)
    </div>
    <button class="menu-btn" onclick="startGame()">게임 시작</button>
</div>

<div id="hud">
    <div>나 <span id="us">0</span></div>
    <div id="status">대기</div>
    <div>상대 <span id="cs">0</span></div>
</div>

<div id="court">
    <div id="net"></div>
    <div id="ball"></div>
    <div id="msg">OUT</div>
    
    <svg id="user-pad" class="paddle" viewBox="0 0 100 120">
        <rect x="42" y="80" width="16" height="40" fill="#8d6e63" rx="2"/>
        <circle cx="50" cy="45" r="45" fill="#d32f2f" stroke="#333" stroke-width="3"/>
    </svg>
    <svg id="cpu-pad" class="paddle" viewBox="0 0 100 120">
        <rect x="42" y="0" width="16" height="40" fill="#8d6e63" rx="2"/>
        <circle cx="50" cy="75" r="45" fill="#1976d2" stroke="#333" stroke-width="3"/>
    </svg>
</div>

<script>
/* [사운드 시스템 추가] */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'hit') { // 라켓 타격음
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(600, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    } else if (type === 'bounce') { // 테이블 바운드음
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
        osc.start(); osc.stop(audioCtx.currentTime + 0.05);
    } else if (type === 'point') { // 득점/실점음
        osc.type = 'square';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    }
}

/* [기존 게임 코드 유지] */
const court = document.getElementById('court');
const ballEl = document.getElementById('ball');
const userEl = document.getElementById('user-pad');
const cpuEl = document.getElementById('cpu-pad');
const msgEl = document.getElementById('msg');
const statusEl = document.getElementById('status');

let state = {
    running: false, score: { u: 0, c: 0 },
    ball: { x: 0, y: 0, z: 0, dx: 0, dy: 0, dz: 0 },
    user: { x: 0, y: 0, vx: 0, vy: 0, prevX: 0, prevY: 0 },
    cpu: { x: 0, y: 0 },
    gameState: 'WAIT_SERVE', 
    server: 'user', 
    serveCount: 0,   
    lastHitter: '', bounceHistory: []
};

function startGame() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    document.getElementById('menu').style.display = 'none';
    state.score = { u: 0, c: 0 };
    state.server = 'user';
    state.serveCount = 0;
    document.getElementById('us').innerText = "0";
    document.getElementById('cs').innerText = "0";
    resetRound();
}

function resetRound() {
    state.running = true; state.gameState = 'WAIT_SERVE'; state.bounceHistory = [];
    state.lastHitter = '';
    
    if (state.server === 'user') {
        state.ball = { x: W()/2, y: H()-100, z: 25, dx: 0, dy: 0, dz: 0 };
        statusEl.innerText = "내 서브 (클릭 토스)";
    } else {
        state.ball = { x: W()/2, y: 100, z: 25, dx: 0, dy: 0, dz: 0 };
        statusEl.innerText = "상대 서브 대기";
        setTimeout(() => cpuServe(), 1500);
    }
    if (!loopId) loop();
}

let loopId;
function loop() {
    if (!state.running) { loopId = null; return; }
    loopId = requestAnimationFrame(loop);

    if (state.gameState !== 'WAIT_SERVE') {
        state.ball.x += state.ball.dx;
        state.ball.y += state.ball.dy;
        state.ball.dz -= 0.22; 
        state.ball.z += state.ball.dz;
    }

    if (state.ball.z <= 0) {
        state.ball.z = 0;
        state.ball.dz = Math.abs(state.ball.dz) * 0.6;
        
        const isUserSide = state.ball.y > H()/2;
        const inTable = (state.ball.x > 0 && state.ball.x < W() && state.ball.y > 0 && state.ball.y < H());

        if (inTable) {
            state.bounceHistory.push(isUserSide ? 'USER' : 'CPU');
            playSound('bounce'); // 바운드음 발생
        } else {
            determinePoint();
        }
    }

    if (state.ball.z > 0 && state.ball.z < 85 && state.ball.y > H()/2) {
        let dist = Math.hypot(state.ball.x - state.user.x, state.ball.y - state.user.y);
        let speed = Math.hypot(state.user.vx, state.user.vy);

        if (dist < 65 && speed > 1.8) {
            if (state.gameState === 'TOSSING' || (state.gameState === 'RALLY' && state.ball.dy > 0)) {
                hitBall('user', speed);
            }
        }
    }

    state.cpu.x += (state.ball.x - state.cpu.x) * 0.12;
    state.cpu.y = 80;
    if (state.ball.y < 150 && state.ball.dy < 0 && state.ball.z < 70) {
        if (Math.abs(state.ball.x - state.cpu.x) < 65) {
            if (state.gameState === 'RALLY' && Math.random() < 0.05) return; 
            hitBall('cpu', 12);
        }
    }
    draw();
}

function determinePoint() {
    if (!state.running) return;
    const bh = state.bounceHistory;
    const lastH = state.lastHitter;
    if (lastH === 'user') endPoint(bh[bh.length-1] === 'CPU');
    else if (lastH === 'cpu') endPoint(bh[bh.length-1] !== 'USER');
    else endPoint(false);
}

function hitBall(hitter, swingSpeed) {
    const isServe = state.gameState === 'TOSSING' || (hitter === 'cpu' && state.gameState === 'CPU_SERVE_TOSS');
    state.gameState = 'RALLY';
    state.lastHitter = hitter;
    playSound('hit'); // 타격음 발생

    if (hitter === 'user') {
        state.ball.dx = (state.user.x - state.user.prevX) * 0.6;
        if (isServe) {
            if (state.ball.z > 45) { state.ball.dy = -28; state.ball.dz = -1; }
            else if (state.ball.z < 15) { state.ball.dy = -8; state.ball.dz = 1; }
            else { state.ball.dy = -18; state.ball.dz = -2; }
        } else {
            let power = Math.max(swingSpeed * 1.6, 20);
            state.ball.dy = -power; state.ball.dz = 5;
        }
    } else {
        state.ball.dx = (Math.random() - 0.5) * 10;
        state.ball.dy = isServe ? 18 : 15 + Math.random()*10;
        state.ball.dz = isServe ? -2 : 5;
    }
    state.bounceHistory = [];
}

function cpuServe() {
    if (state.gameState !== 'WAIT_SERVE') return;
    state.gameState = 'CPU_SERVE_TOSS';
    state.ball.dz = 7;
    setTimeout(() => {
        if (Math.random() < 0.25) { statusEl.innerText = "상대 서브 범실!"; endPoint(true); return; }
        hitBall('cpu', 10);
    }, 600);
}

function endPoint(userWin) {
    if (!state.running) return;
    state.running = false;
    playSound('point'); // 점수음 발생
    userWin ? state.score.u++ : state.score.c++;
    
    document.getElementById('us').innerText = state.score.u;
    document.getElementById('cs').innerText = state.score.c;
    msgEl.innerText = userWin ? "득점!" : "실점!";
    msgEl.style.display = 'block';

    const isDeuce = state.score.u >= 10 && state.score.c >= 10;
    state.serveCount++;
    if (isDeuce || state.serveCount >= 2) {
        state.server = (state.server === 'user') ? 'cpu' : 'user';
        state.serveCount = 0;
    }
    setTimeout(() => { msgEl.style.display = 'none'; resetRound(); }, 1200);
}

function draw() {
    ballEl.style.left = state.ball.x + 'px';
    ballEl.style.top = (state.ball.y - state.ball.z) + 'px';
    ballEl.style.transform = `translate(-50%, -50%) scale(${1 + state.ball.z/150})`;
    userEl.style.left = state.user.x + 'px';
    userEl.style.top = state.user.y + 'px';
    cpuEl.style.left = state.cpu.x + 'px';
    cpuEl.style.top = state.cpu.y + 'px';
}

window.addEventListener('mousedown', () => {
    if (state.gameState === 'WAIT_SERVE' && state.server === 'user') {
        state.gameState = 'TOSSING';
        state.ball.dz = 7.5;
        statusEl.innerText = "서브 타격!";
    }
});

court.addEventListener('mousemove', e => {
    const rect = court.getBoundingClientRect();
    state.user.x = e.clientX - rect.left;
    state.user.y = Math.max(H()/2 + 60, e.clientY - rect.top);
    state.user.vx = state.user.x - state.user.prevX;
    state.user.vy = state.user.y - state.user.prevY;
    state.user.prevX = state.user.x; state.user.prevY = state.user.y;
});

const W = () => court.clientWidth;
const H = () => court.clientHeight;
</script>
</body>
</html>
