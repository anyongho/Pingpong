<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>모바일 리얼 탁구 (정리버전)</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

#court {
  flex: 1;
  position: relative;
  background: #1e5d2f;
  border: 4px solid white;
}

#net {
  position: absolute;
  top: 50%;
  width: 100%;
  height: 4px;
  background: rgba(255,255,255,0.4);
}

#ball {
  position: absolute;
  width: 14px;
  height: 14px;
  background: white;
  border-radius: 50%;
  transform: translate(-50%, -50%);
}

.paddle {
  position: absolute;
  width: 60px;
  height: 60px;
  transform: translate(-50%, -50%);
}

#controls {
  display: flex;
  justify-content: center;
  padding: 10px;
  background: #111;
}

button.active { background: gold; }
</style>
</head>

<body>

<div id="court">
  <div id="net"></div>
  <div id="ball"></div>
  <div id="user" class="paddle"></div>
  <div id="cpu" class="paddle"></div>
</div>

<div id="controls">
  <button onclick="setSkill('cut')">커트</button>
  <button onclick="setSkill('drive')" class="active">드라이브</button>
  <button onclick="setSkill('smash')">스매시</button>
</div>

<script>
// =====================
// 상태
// =====================
const state = {
  skill: 'drive',
  level: 1,
  running: true,

  ball: { x: 0, y: 0, dx: 0, dy: 0 },
  user: { x: 0 },
  cpu: { x: 0 }
};

const LEVEL = [
  { cpu: 0.015, ball: 5 },
  { cpu: 0.025, ball: 7 },
  { cpu: 0.04, ball: 10 }
];

// =====================
// DOM
// =====================
const court = document.getElementById('court');
const ballEl = document.getElementById('ball');
const userEl = document.getElementById('user');
const cpuEl = document.getElementById('cpu');

// =====================
// 유틸
// =====================
const W = () => court.clientWidth;
const H = () => court.clientHeight;

// =====================
// 입력
// =====================
court.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = court.getBoundingClientRect();
  state.user.x = e.touches[0].clientX - rect.left;
  state.user.x = clamp(state.user.x, 30, W() - 30);
}, { passive: false });

function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}

// =====================
// 물리
// =====================
function moveBall() {
  state.ball.x += state.ball.dx;
  state.ball.y += state.ball.dy;
}

function outCheck() {
  if (state.ball.x < 0 || state.ball.x > W())
    score(state.ball.dy < 0);

  if (state.ball.y < 0)
    score(true);

  if (state.ball.y > H())
    score(false);
}

// =====================
// 충돌
// =====================
function hitUser() {
  const y = H() - 50;

  if (state.ball.y > y && state.ball.dy > 0) {
    if (isHit(state.user.x)) {
      applySkill();
    }
  }
}

function hitCPU() {
  const y = 50;

  if (state.ball.y < y && state.ball.dy < 0) {
    if (isHit(state.cpu.x)) {
      state.ball.dy = Math.abs(state.ball.dy);
    }
  }
}

function isHit(px) {
  return state.ball.x > px - 35 && state.ball.x < px + 35;
}

function applySkill() {
  const map = { cut: 1, drive: 1.5, smash: 2 };

  state.ball.dy = -Math.abs(state.ball.dy) * map[state.skill];
  state.ball.dx += (state.ball.x - state.user.x) * 0.05;
}

// =====================
// AI
// =====================
function cpuAI() {
  const speed = W() * LEVEL[state.level - 1].cpu;
  const target = state.ball.x;

  if (state.cpu.x < target) state.cpu.x += speed;
  else state.cpu.x -= speed;
}

// =====================
// 점수
// =====================
function score(userWin) {
  state.running = false;
  setTimeout(resetBall, 400);
}

// =====================
// 렌더
// =====================
function draw() {
  ballEl.style.left = state.ball.x + 'px';
  ballEl.style.top = state.ball.y + 'px';

  userEl.style.left = state.user.x + 'px';
  userEl.style.top = (H() - 50) + 'px';

  cpuEl.style.left = state.cpu.x + 'px';
  cpuEl.style.top = '50px';
}

// =====================
// 루프
// =====================
function loop() {
  if (!state.running) return;

  moveBall();
  outCheck();
  hitUser();
  hitCPU();
  cpuAI();
  draw();

  requestAnimationFrame(loop);
}

// =====================
// 초기화
// =====================
function resetBall() {
  state.running = true;

  state.ball = {
    x: W() / 2,
    y: H() / 2,
    dx: (Math.random() - 0.5) * W() * 0.02,
    dy: LEVEL[state.level - 1].ball
  };

  state.user.x = W() / 2;
  state.cpu.x = W() / 2;

  loop();
}

function setSkill(s) {
  state.skill = s;
}

// 시작
window.addEventListener('resize', resetBall);
resetBall();
</script>

</body>
</html>
