<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ITTF 정식 규격 탁구 2026</title>
    <style>
        :root { --table: #1e5d2f; --line: #ffffff; }
        body { margin: 0; background: #000; overflow: hidden; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; touch-action: none; color: white; }
        
        /* 메뉴 및 UI */
        #menu { position: absolute; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .menu-btn { padding: 15px 40px; border: 2px solid #f1c40f; background: transparent; color: #f1c40f; font-weight: bold; cursor: pointer; border-radius: 30px; margin: 10px; font-size: 18px; }
        .menu-btn:hover { background: #f1c40f; color: #000; }

        /* 탁구대 구역 */
        #court { flex: 1; position: relative; background: var(--table); border: 8px solid var(--line); margin: 5px; perspective: 1200px; overflow: hidden; }
        #net { position: absolute; top: 50%; width: 100%; height: 8px; background: rgba(255,255,255,0.7); border: 1px solid #fff; z-index: 5; }
        #hud { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-around; font-size: 22px; font-weight: bold; z-index: 30; pointer-events: none; text-shadow: 2px 2px 4px #000; }
        #hud .service-mark { color: #ff0; font-size: 14px; display: block; text-align: center; }

        /* 오브젝트 */
        #ball { position: absolute; width: 16px; height: 16px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); z-index: 10; box-shadow: 0 4px 8px rgba(0,0,0,0.4); }
        #ball-shadow { position: absolute; width: 16px; height: 8px; background: rgba(0,0,0,0.3); border-radius: 50%; transform: translate(-50%, -50%); z-index: 4; }
        .paddle { position: absolute; width: 80px; height: 80px; transform: translate(-50%, -50%); z-index: 20; pointer-events: none; }
        
        /* 하단 기술 버튼 */
        #controls { display: flex; justify-content: center; gap: 10px; padding: 15px; background: #111; z-index: 50; }
        .skill-btn { padding: 12px 20px; border-radius: 10px; border: 1px solid #444; background: #222; color: white; cursor: pointer; font-weight: bold; }
        .skill-btn.active { background: #f1c40f; color: #000; border-color: #f1c40f; }

        #msg { position: absolute; top: 60%; width: 100%; text-align: center; font-size: 28px; color: #f1c40f; font-weight: bold; display: none; z-index: 40; }
    </style>
</head>
<body>

<div id="menu">
    <h1 style="color:#f1c40f">🏓 ITTF 정식 탁구 챌린지</h1>
    <p>난이도를 선택해 게임을 시작하세요</p>
    <button class="menu-btn" onclick="initGame(0)">초보자 (Lv.1)</button>
    <button class="menu-btn" onclick="initGame(1)">아마추어 (Lv.2)</button>
    <button class="menu-btn" onclick="initGame(2)">국가대표 (Lv.3)</button>
</div>

<div id="hud">
    <div>나 <span id="us">0</span><div id="u-serve" class="service-mark">SERVE</div></div>
    <div id="info">11점 선승</div>
    <div>상대 <span id="cs">0</span><div id="c-serve" class="service-mark">SERVE</div></div>
</div>

<div id="court">
    <div id="net"></div>
    <div id="ball-shadow"></div>
    <div id="ball"></div>
    <div id="msg">OUT</div>
    <svg id="user-pad" class="paddle" viewBox="0 0 100 100"><circle cx="50" cy="40" r="40" fill="#e74c3c" stroke="#333" stroke-width="5"/><rect x="45" y="80" width="10" height="20" fill="#5d4037"/></svg>
    <svg id="cpu-pad" class="paddle" viewBox="0 0 100 100"><circle cx="50" cy="60" r="40" fill="#3498db" stroke="#333" stroke-width="5"/><rect x="45" y="0" width="10" height="20" fill="#5d4037"/></svg>
</div>

<div id="controls">
    <button id="btn-cut" class="skill-btn" onclick="setSkill('cut')">커트 🛡️</button>
    <button id="btn-drive" class="skill-btn active" onclick="setSkill('drive')">드라이브 ⚔️</button>
    <button id="btn-smash" class="skill-btn" onclick="setSkill('smash')">스매시 💥</button>
</div>

<script>
const court = document.getElementById('court');
const ballEl = document.getElementById('ball');
const shadowEl = document.getElementById('ball-shadow');
const userEl = document.getElementById('user-pad');
const cpuEl = document.getElementById('cpu-pad');
const msgEl = document.getElementById('msg');

let state = {
    running: false,
    score: { u: 0, c: 0 },
    level: 0,
    skill: 'drive',
    ball: { x: 0, y: 0, z: 0, dx: 0, dy: 0, dz: 0 },
    user: { x: 200, swing: 0, prevX: 200 },
    cpu: { x: 200 },
    server: 'user', // 현재 서브권자
    pointCount: 0,   // 현재 경기 진행 득점 수 (서브권 교체용)
    isService: true, // 현재 랠리가 서브 상태인지
    bounces: 0,      // 현재 턴 바운드 횟수
    lastHitter: ''
};

const LEVELS = [
    { cpuSpeed: 5, ballSpeed: 6, reaction: 0.1 },
    { cpuSpeed: 8, ballSpeed: 9, reaction: 0.05 },
    { cpuSpeed: 12, ballSpeed: 13, reaction: 0 }
];

function setSkill(s) {
    state.skill = s;
    document.querySelectorAll('.skill-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + s).classList.add('active');
}

function initGame(lv) {
    state.level = lv;
    state.score = { u: 0, c: 0 };
    state.pointCount = 0;
    state.server = 'user';
    document.getElementById('menu').style.display = 'none';
    resetRound();
}

function resetRound() {
    state.running = false;
    state.bounces = 0;
    state.isService = true;
    state.lastHitter = state.server;
    
    // 서브권 표시
    document.getElementById('u-serve').style.visibility = (state.server === 'user') ? 'visible' : 'hidden';
    document.getElementById('c-serve').style.visibility = (state.server === 'cpu') ? 'visible' : 'hidden';

    // 공 위치 초기화 (서브자 쪽으로)
    state.ball.x = W() / 2;
    state.ball.z = 100;
    state.ball.dx = 0;
    state.ball.dz = 0;

    if (state.server === 'user') {
        state.ball.y = H() - 100;
        state.ball.dy = 0; 
        showMsg("당신의 서브! 테이블을 먼저 맞추세요.");
        setTimeout(() => { state.running = true; loop(); }, 1500);
    } else {
        state.ball.y = 100;
        state.ball.dy = 0;
        showMsg("상대 서브 대기...");
        setTimeout(cpuServe, 1500);
    }
}

function cpuServe() {
    state.running = true;
    state.ball.dy = LEVELS[state.level].ballSpeed * 0.7;
    state.ball.dz = -2; // 아래로 던짐
    loop();
}

function loop() {
    if (!state.running) return;

    // 물리 이동
    state.ball.x += state.ball.dx;
    state.ball.y += state.ball.dy;
    state.ball.dz -= 0.25; // 중력
    state.ball.z += state.ball.dz;

    // 바운드 판정
    if (state.ball.z <= 0) {
        state.ball.z = 0;
        state.ball.dz = Math.abs(state.ball.dz) * 0.85;
        state.bounces++;
        handleBounce();
    }

    // 충돌 판정 (라켓)
    if (state.ball.z < 40) {
        // 내 라켓 (하단)
        if (state.ball.y > H() - 60 && state.ball.dy > 0) {
            if (Math.abs(state.ball.x - state.user.x) < 50) hitBall('user');
        }
        // CPU 라켓 (상단)
        if (state.ball.y < 60 && state.ball.dy < 0) {
            if (Math.abs(state.ball.x - state.cpu.x) < 55) hitBall('cpu');
        }
    }

    // 아웃 판정
    if (state.ball.y < -50 || state.ball.y > H() + 50 || state.ball.x < -30 || state.ball.x > W() + 30) {
        endPoint(state.lastHitter === 'user' && state.bounces > 0);
    }

    // CPU AI (공 추적)
    const targetX = state.ball.x;
    if (state.cpu.x < targetX) state.cpu.x += LEVELS[state.level].cpuSpeed;
    else state.cpu.x -= LEVELS[state.level].cpuSpeed;

    draw();
    requestAnimationFrame(loop);
}

function handleBounce() {
    const isUserSide = state.ball.y > H() / 2;
    
    if (state.isService) {
        // 서브 시: 내 진영 바운드 필수
        if (state.lastHitter === 'user' && state.bounces === 1 && !isUserSide) endPoint(false); // 내 진영 안맞음
        if (state.lastHitter === 'cpu' && state.bounces === 1 && isUserSide) endPoint(true);
        if (state.bounces === 2) state.isService = false; // 서브 성공 후 랠리 전환
    } else {
        // 일반 랠리: 상대 진영에 한 번만 튀어야 함
        if (state.bounces > 1) endPoint(state.lastHitter === 'cpu');
    }
}

function hitBall(hitter) {
    state.lastHitter = hitter;
    state.bounces = 0;
    const lv = LEVELS[state.level];

    if (hitter === 'user') {
        const power = state.skill === 'smash' ? 1.8 : (state.skill === 'drive' ? 1.3 : 0.8);
        state.ball.dy = -lv.ballSpeed * power;
        state.ball.dx = (state.ball.x - state.user.x) * 0.2 + (state.user.swing * 0.3);
        state.ball.dz = 5 + (state.skill === 'drive' ? 3 : 1);
    } else {
        state.ball.dy = lv.ballSpeed;
        state.ball.dx = (state.ball.x - state.cpu.x) * 0.15 + (Math.random() - 0.5) * 4;
        state.ball.dz = 6;
    }
}

function endPoint(userWon) {
    state.running = false;
    userWon ? state.score.u++ : state.score.c++;
    state.pointCount++;
    
    updateScoreUI();
    showMsg(userWon ? "득점!" : "실점...");

    // 서브권 교체 (2점마다, 10:10 듀스부터는 1점마다)
    const isDeuce = state.score.u >= 10 && state.score.c >= 10;
    if ((!isDeuce && state.pointCount % 2 === 0) || (isDeuce)) {
        state.server = (state.server === 'user') ? 'cpu' : 'user';
    }

    setTimeout(() => {
        if (state.score.u >= 11 || state.score.c >= 11) {
            if (Math.abs(state.score.u - state.score.c) >= 2) return endGame();
        }
        resetRound();
    }, 1500);
}

function draw() {
    const bScale = 1 + (state.ball.z / 150);
    ballEl.style.left = state.ball.x + 'px';
    ballEl.style.top = (state.ball.y - state.ball.z) + 'px';
    ballEl.style.transform = `translate(-50%, -50%) scale(${bScale})`;

    shadowEl.style.left = state.ball.x + 'px';
    shadowEl.style.top = state.ball.y + 'px';
    shadowEl.style.transform = `translate(-50%, -50%) scale(${bScale * 0.8})`;

    userEl.style.left = state.user.x + 'px';
    userEl.style.top = (H() - 60) + 'px';
    userEl.style.transform = `translate(-50%, -50%) rotate(${state.user.swing}deg)`;

    cpuEl.style.left = state.cpu.x + 'px';
    cpuEl.style.top = '60px';
}

function updateScoreUI() {
    document.getElementById('us').innerText = state.score.u;
    document.getElementById('cs').innerText = state.score.c;
}

function showMsg(t) {
    msgEl.innerText = t;
    msgEl.style.display = 'block';
    setTimeout(() => msgEl.style.display = 'none', 1500);
}

function endGame() {
    alert(state.score.u > state.score.c ? "축하합니다! 경기 승리!" : "아쉽네요. 패배했습니다.");
    document.getElementById('menu').style.display = 'flex';
}

// 유틸리티
const W = () => court.clientWidth;
const H = () => court.clientHeight;
window.addEventListener('mousemove', e => {
    const rect = court.getBoundingClientRect();
    state.user.x = e.clientX - rect.left;
    state.user.swing = (state.user.x - state.user.prevX) * 1.5;
    state.user.prevX = state.user.x;
});
</script>
</body>
</html>
